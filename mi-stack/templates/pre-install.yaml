apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-preinstall
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: precheck
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Pre install"